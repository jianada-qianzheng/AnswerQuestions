<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Knowledge Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        h2 { text-align: center; color: #2c3e50; }
        .container { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .info-text { color: #666; font-size: 14px; margin-bottom: 20px; text-align: center; font-style: italic; }
        label { font-weight: bold; display: block; margin-bottom: 8px; margin-top: 15px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; margin-top: 20px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #a0c3ff; cursor: not-allowed; }
        #result-container { margin-top: 25px; padding: 15px; background-color: #e8f0fe; border-radius: 6px; border-left: 4px solid #1a73e8; min-height: 60px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
    <h2>Gemini Knowledge Assistant</h2>
    <div class="container">
        <p class="info-text">The knowledge base is securely loaded from the backend.</p>

        <label for="question">Your Question:</label>
        <input type="text" id="question" placeholder="Ask something about the document..." />

        <button id="askBtn">Submit Question</button>

        <label>AI Answer:</label>
        <div id="result-container">Awaiting input...</div>
    </div>

    <script>
        document.getElementById('askBtn').addEventListener('click', async () => {
            const questionText = document.getElementById('question').value.trim();
            const resultDiv = document.getElementById('result-container');
            const askBtn = document.getElementById('askBtn');

            if (!questionText) {
                alert("Please enter a question!");
                return;
            }

            askBtn.disabled = true;
            askBtn.innerText = "Processing...";
            resultDiv.innerText = "Request sent, analyzing backend document...";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: questionText
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerText = data.answer;
                } else {
                    resultDiv.innerText = `Error: ${data.error}`;
                }
            } catch (error) {
                console.error("Request failed:", error);
                resultDiv.innerText = "Network error occurred. Please try again later.";
            } finally {
                askBtn.disabled = false;
                askBtn.innerText = "Submit Question";
            }
        });
    </script>
</body>
</html>
